name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and release .vsix
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for gh release create

    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compile TypeScript
        run: npm run compile

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Package extension
        run: npm run package

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VSIX="dbt-navigator-${{ steps.version.outputs.version }}.vsix"

          # Delete existing release for this tag if it exists (handles re-releases
          # of the same version before a version bump).
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          gh release create "$TAG" "$VSIX" \
            --title "dbt Navigator $TAG" \
            --notes "## Installation

Download \`$VSIX\` and install it with:

\`\`\`
code --install-extension $VSIX
\`\`\`

Or in VS Code: **Extensions → ··· → Install from VSIX...**" \
            --latest
