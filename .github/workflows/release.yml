name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build and release .vsix
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for gh release create and version bump push

    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Compile TypeScript
        run: npm run compile

      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git push origin HEAD:main
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Package extension
        run: npm run package

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VSIX="dbt-navigator-${{ steps.version.outputs.version }}.vsix"

          printf '## Installation\n\nDownload `%s` and install it with:\n\n```\ncode --install-extension %s\n```\n\nOr in VS Code: **Extensions → ··· → Install from VSIX...**\n' "$VSIX" "$VSIX" > release-notes.md

          gh release create "$TAG" "$VSIX" \
            --title "dbt Navigator $TAG" \
            --notes-file release-notes.md \
            --latest
