<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dbt DAG Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            width: 900px;
            height: 560px;
        }
        #container { width: 100%; height: 100%; position: relative; }

        svg { width: 100%; height: 100%; cursor: grab; }
        svg.panning { cursor: grabbing; }

        .dag-node { cursor: pointer; }
        .dag-node rect { stroke-width: 1.5; transition: opacity 0.3s, filter 0.3s; }
        .dag-node text { pointer-events: none; user-select: none; }
        .dag-node .node-label {
            font-size: 11px;
            font-weight: 600;
            dominant-baseline: central;
            text-anchor: middle;
            fill: #d4d4d4;
        }
        .dag-node .node-badge {
            font-size: 9px;
            dominant-baseline: central;
            text-anchor: middle;
            fill: #888;
            opacity: 0.8;
        }

        .dag-node.mat-table        rect { fill: rgba(79,193,255,0.10); stroke: #4fc1ff; }
        .dag-node.mat-view         rect { fill: rgba(137,209,133,0.10); stroke: #89d185; }
        .dag-node.mat-ephemeral    rect { fill: rgba(204,167,0,0.10);   stroke: #cca700; }
        .dag-node.mat-incremental  rect { fill: rgba(177,128,215,0.10); stroke: #b180d7; }
        .dag-node.mat-snapshot     rect { fill: rgba(255,152,0,0.10);   stroke: #ff9800; }

        .dag-node.highlighted rect { stroke-width: 2.5; }
        .dag-node.mat-table.highlighted        rect { fill: rgba(79,193,255,0.28);  filter: drop-shadow(0 0 6px rgba(79,193,255,0.65)); }
        .dag-node.mat-view.highlighted         rect { fill: rgba(137,209,133,0.28); filter: drop-shadow(0 0 6px rgba(137,209,133,0.65)); }
        .dag-node.mat-ephemeral.highlighted    rect { fill: rgba(204,167,0,0.28);   filter: drop-shadow(0 0 6px rgba(204,167,0,0.65)); }
        .dag-node.mat-incremental.highlighted  rect { fill: rgba(177,128,215,0.28); filter: drop-shadow(0 0 6px rgba(177,128,215,0.65)); }
        .dag-node.mat-snapshot.highlighted     rect { fill: rgba(255,152,0,0.28);   filter: drop-shadow(0 0 6px rgba(255,152,0,0.65)); }

        .dag-node.mat-table.neighbor        rect { fill: rgba(79,193,255,0.16); }
        .dag-node.mat-view.neighbor         rect { fill: rgba(137,209,133,0.16); }
        .dag-node.mat-incremental.neighbor  rect { fill: rgba(177,128,215,0.16); }

        .dag-node.dimmed { opacity: 0.12; pointer-events: none; }

        .dag-edge {
            fill: none;
            stroke: #444;
            stroke-width: 1.5;
            transition: opacity 0.3s, stroke-width 0.3s;
        }
        .dag-edge.edge-dimmed      { opacity: 0.05; }
        .dag-edge.edge-highlighted { stroke: #007fd4; stroke-width: 2.2; opacity: 1; }

        #arrowhead    path { fill: #444; }
        #arrowhead-hl path { fill: #007fd4; }

        #controls {
            position: absolute; bottom: 12px; right: 12px;
            display: flex; flex-direction: column; gap: 4px; z-index: 10;
        }
        .ctrl-btn {
            width: 26px; height: 26px;
            border: 1px solid #555; background: #1e1e1e; color: #d4d4d4;
            border-radius: 4px; cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            line-height: 1;
        }
        .ctrl-btn:hover { background: rgba(90,90,90,0.31); }

        #legend {
            position: absolute; bottom: 12px; left: 12px;
            display: flex; flex-wrap: wrap; gap: 8px; z-index: 10; max-width: 220px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888; }
        .legend-swatch { width: 10px; height: 10px; border-radius: 2px; border: 1px solid; opacity: 0.85; }

        #status-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.55); border: 1px solid #333;
            color: #aaa; font-size: 11px; padding: 4px 12px; border-radius: 12px;
            pointer-events: none; z-index: 20; transition: opacity 0.4s;
        }
    </style>
</head>
<body>
<div id="container">
    <svg id="dag-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrowhead" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
                <path d="M 0 0 L 10 3.5 L 0 7 z"/>
            </marker>
            <marker id="arrowhead-hl" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="6" markerHeight="5" orient="auto">
                <path d="M 0 0 L 10 3.5 L 0 7 z"/>
            </marker>
        </defs>
        <g id="dag-root"></g>
    </svg>

    <div id="controls">
        <button class="ctrl-btn" id="btn-zi" title="Zoom in">+</button>
        <button class="ctrl-btn" id="btn-zo" title="Zoom out">&#8722;</button>
        <button class="ctrl-btn" id="btn-fit" title="Fit all">&#8862;</button>
    </div>

    <div id="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(79,193,255,0.2);border-color:#4fc1ff"></div>table</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(137,209,133,0.2);border-color:#89d185"></div>view</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(204,167,0,0.2);border-color:#cca700"></div>ephemeral</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(177,128,215,0.2);border-color:#b180d7"></div>incremental</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,152,0,0.2);border-color:#ff9800"></div>snapshot</div>
    </div>

    <div id="status-bar">Full graph view — open a model file to focus</div>
</div>

<script>
    var svgEl     = document.getElementById('dag-svg');
    var rootGroup = document.getElementById('dag-root');
    var statusBar = document.getElementById('status-bar');

    // ---- Sample graph data (realistic dbt project) ----
    var nodes = [
        { id: 'src_orders',       name: 'src_orders',       materialized: 'view',        layer: 0 },
        { id: 'src_customers',    name: 'src_customers',    materialized: 'view',        layer: 0 },
        { id: 'src_payments',     name: 'src_payments',     materialized: 'view',        layer: 0 },
        { id: 'src_products',     name: 'src_products',     materialized: 'view',        layer: 0 },
        { id: 'src_inventory',    name: 'src_inventory',    materialized: 'view',        layer: 0 },
        { id: 'stg_orders',       name: 'stg_orders',       materialized: 'view',        layer: 1 },
        { id: 'stg_customers',    name: 'stg_customers',    materialized: 'view',        layer: 1 },
        { id: 'stg_payments',     name: 'stg_payments',     materialized: 'view',        layer: 1 },
        { id: 'stg_products',     name: 'stg_products',     materialized: 'view',        layer: 1 },
        { id: 'stg_inventory',    name: 'stg_inventory',    materialized: 'view',        layer: 1 },
        { id: 'int_order_items',  name: 'int_order_items',  materialized: 'ephemeral',   layer: 2 },
        { id: 'int_customer_ltv', name: 'int_customer_ltv', materialized: 'ephemeral',   layer: 2 },
        { id: 'int_payments_agg', name: 'int_payments_agg', materialized: 'ephemeral',   layer: 2 },
        { id: 'fct_orders',       name: 'fct_orders',       materialized: 'incremental', layer: 3 },
        { id: 'fct_revenue',      name: 'fct_revenue',      materialized: 'incremental', layer: 3 },
        { id: 'dim_customers',    name: 'dim_customers',    materialized: 'table',       layer: 3 },
        { id: 'dim_products',     name: 'dim_products',     materialized: 'table',       layer: 3 },
        { id: 'orders_snapshot',  name: 'orders_snapshot',  materialized: 'snapshot',    layer: 3 },
        { id: 'mrt_orders',       name: 'mrt_orders',       materialized: 'table',       layer: 4 },
        { id: 'mrt_customers',    name: 'mrt_customers',    materialized: 'table',       layer: 4 },
        { id: 'mrt_finance',      name: 'mrt_finance',      materialized: 'table',       layer: 4 },
    ];

    var edges = [
        { source: 'src_orders',       target: 'stg_orders' },
        { source: 'src_customers',    target: 'stg_customers' },
        { source: 'src_payments',     target: 'stg_payments' },
        { source: 'src_products',     target: 'stg_products' },
        { source: 'src_inventory',    target: 'stg_inventory' },
        { source: 'stg_orders',       target: 'int_order_items' },
        { source: 'stg_products',     target: 'int_order_items' },
        { source: 'stg_customers',    target: 'int_customer_ltv' },
        { source: 'stg_orders',       target: 'int_customer_ltv' },
        { source: 'stg_payments',     target: 'int_payments_agg' },
        { source: 'stg_orders',       target: 'int_payments_agg' },
        { source: 'int_order_items',  target: 'fct_orders' },
        { source: 'int_payments_agg', target: 'fct_orders' },
        { source: 'int_payments_agg', target: 'fct_revenue' },
        { source: 'int_customer_ltv', target: 'dim_customers' },
        { source: 'stg_products',     target: 'dim_products' },
        { source: 'stg_inventory',    target: 'dim_products' },
        { source: 'stg_orders',       target: 'orders_snapshot' },
        { source: 'fct_orders',       target: 'mrt_orders' },
        { source: 'dim_customers',    target: 'mrt_orders' },
        { source: 'dim_customers',    target: 'mrt_customers' },
        { source: 'fct_revenue',      target: 'mrt_customers' },
        { source: 'fct_revenue',      target: 'mrt_finance' },
        { source: 'dim_products',     target: 'mrt_finance' },
    ];

    var NODE_W = 150, NODE_H = 34, LAYER_GAP = 110, NODE_GAP = 16, PADDING = 40;

    var vb = { x: 0, y: 0, w: 900, h: 560 };
    var fullVB = null;
    var layoutData = new Map();
    var animReq = null;

    function applyVB() {
        svgEl.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);
    }

    function animateVB(target, duration) {
        if (!duration) duration = 480;
        if (animReq) cancelAnimationFrame(animReq);
        var sx = vb.x, sy = vb.y, sw = vb.w, sh = vb.h;
        var t0 = performance.now();
        function step(now) {
            var p = Math.min((now - t0) / duration, 1);
            var ease = 1 - Math.pow(1 - p, 3);
            vb.x = sx + (target.x - sx) * ease;
            vb.y = sy + (target.y - sy) * ease;
            vb.w = sw + (target.w - sw) * ease;
            vb.h = sh + (target.h - sh) * ease;
            applyVB();
            if (p < 1) animReq = requestAnimationFrame(step);
        }
        animReq = requestAnimationFrame(step);
    }

    // --- Build layout ---
    // Group nodes by layer
    var layerGroups = new Map();
    nodes.forEach(function(n) {
        if (!layerGroups.has(n.layer)) layerGroups.set(n.layer, []);
        layerGroups.get(n.layer).push(n.id);
    });

    var maxLayer = 0;
    var maxNodesInLayer = 0;
    layerGroups.forEach(function(ids, layer) {
        if (layer > maxLayer) maxLayer = layer;
        if (ids.length > maxNodesInLayer) maxNodesInLayer = ids.length;
        ids.forEach(function(id, idx) {
            var x = PADDING + layer * (NODE_W + LAYER_GAP) + NODE_W / 2;
            var y = PADDING + idx * (NODE_H + NODE_GAP) + NODE_H / 2;
            layoutData.set(id, { x: x, y: y });
        });
    });

    var totalW = PADDING * 2 + (maxLayer + 1) * NODE_W + maxLayer * LAYER_GAP;
    var totalH = PADDING * 2 + maxNodesInLayer * NODE_H + (maxNodesInLayer - 1) * NODE_GAP;
    var svgAspect = 900 / 560;
    var fw = totalW, fh = totalH;
    if (fw / fh < svgAspect) fw = fh * svgAspect;
    else fh = fw / svgAspect;
    fw *= 1.06; fh *= 1.06;
    fullVB = { x: (totalW - fw) / 2, y: (totalH - fh) / 2, w: fw, h: fh };
    vb = { x: fullVB.x, y: fullVB.y, w: fullVB.w, h: fullVB.h };
    applyVB();

    // --- Render ---
    var edgesEl = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    edges.forEach(function(e) {
        var from = layoutData.get(e.source);
        var to   = layoutData.get(e.target);
        if (!from || !to) return;
        var x1 = from.x + NODE_W / 2, y1 = from.y;
        var x2 = to.x   - NODE_W / 2, y2 = to.y;
        var cx = (x1 + x2) / 2;
        var pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pathEl.setAttribute('d', 'M ' + x1 + ' ' + y1 + ' C ' + cx + ' ' + y1 + ',' + cx + ' ' + y2 + ',' + x2 + ' ' + y2);
        pathEl.classList.add('dag-edge');
        pathEl.setAttribute('marker-end', 'url(#arrowhead)');
        pathEl.dataset.source = e.source;
        pathEl.dataset.target = e.target;
        edgesEl.appendChild(pathEl);
    });
    rootGroup.appendChild(edgesEl);

    var nodesEl = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    nodes.forEach(function(n) {
        var pos = layoutData.get(n.id);
        if (!pos) return;

        var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('dag-node', 'mat-' + n.materialized);
        g.dataset.nodeId = n.id;

        var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', pos.x - NODE_W / 2);
        rect.setAttribute('y', pos.y - NODE_H / 2);
        rect.setAttribute('width', NODE_W);
        rect.setAttribute('height', NODE_H);
        rect.setAttribute('rx', '5');
        rect.setAttribute('ry', '5');
        g.appendChild(rect);

        var maxChars = 19;
        var label = n.name.length > maxChars ? n.name.slice(0, maxChars - 1) + '\u2026' : n.name;
        var nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        nameEl.setAttribute('x', pos.x);
        nameEl.setAttribute('y', pos.y - 5);
        nameEl.classList.add('node-label');
        nameEl.textContent = label;
        g.appendChild(nameEl);

        var badgeEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        badgeEl.setAttribute('x', pos.x);
        badgeEl.setAttribute('y', pos.y + 9);
        badgeEl.classList.add('node-badge');
        badgeEl.textContent = n.materialized;
        g.appendChild(badgeEl);

        nodesEl.appendChild(g);
    });
    rootGroup.appendChild(nodesEl);

    // --- Highlight function (same as extension) ---
    function highlightNode(nodeId) {
        var allNodes = document.querySelectorAll('.dag-node');
        var allEdges = document.querySelectorAll('.dag-edge');

        if (!nodeId) {
            allNodes.forEach(function(el) { el.classList.remove('highlighted', 'neighbor', 'dimmed'); });
            allEdges.forEach(function(el) {
                el.classList.remove('edge-highlighted', 'edge-dimmed');
                el.setAttribute('marker-end', 'url(#arrowhead)');
            });
            animateVB(fullVB);
            return;
        }

        var parents = new Set(), children = new Set();
        edges.forEach(function(e) {
            if (e.target === nodeId) parents.add(e.source);
            if (e.source === nodeId) children.add(e.target);
        });
        var neighbors = new Set();
        parents.forEach(function(id) { neighbors.add(id); });
        children.forEach(function(id) { neighbors.add(id); });

        allNodes.forEach(function(el) {
            var id = el.dataset.nodeId;
            el.classList.remove('highlighted', 'neighbor', 'dimmed');
            if      (id === nodeId)     el.classList.add('highlighted');
            else if (neighbors.has(id)) el.classList.add('neighbor');
            else                        el.classList.add('dimmed');
        });

        allEdges.forEach(function(el) {
            var src = el.dataset.source, tgt = el.dataset.target;
            el.classList.remove('edge-highlighted', 'edge-dimmed');
            if (src === nodeId || tgt === nodeId) {
                el.classList.add('edge-highlighted');
                el.setAttribute('marker-end', 'url(#arrowhead-hl)');
            } else {
                el.classList.add('edge-dimmed');
                el.setAttribute('marker-end', 'url(#arrowhead)');
            }
        });

        // Zoom to neighborhood
        var focus = [nodeId];
        neighbors.forEach(function(id) { focus.push(id); });
        var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        focus.forEach(function(id) {
            var pos = layoutData.get(id);
            if (!pos) return;
            if (pos.x - NODE_W/2 < minX) minX = pos.x - NODE_W/2;
            if (pos.y - NODE_H/2 < minY) minY = pos.y - NODE_H/2;
            if (pos.x + NODE_W/2 > maxX) maxX = pos.x + NODE_W/2;
            if (pos.y + NODE_H/2 > maxY) maxY = pos.y + NODE_H/2;
        });
        var pad = 80;
        var tw = maxX - minX + pad*2, th = maxY - minY + pad*2;
        var tx = minX - pad, ty = minY - pad;
        if (tw/th < svgAspect) { var nw = th*svgAspect; tx -= (nw-tw)/2; tw = nw; }
        else { var nh = tw/svgAspect; ty -= (nh-th)/2; th = nh; }
        animateVB({ x: tx, y: ty, w: tw, h: th });
    }

    // Expose for the automation script
    window.highlightNode = highlightNode;
    window.fitView = function() { animateVB(fullVB); };
    window.isAnimating = function() { return animReq !== null; };
    window.setStatus = function(txt) { statusBar.textContent = txt; };
</script>
</body>
</html>
